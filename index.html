<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>測試網站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>歡迎來到測試網站</h1>
    <p>這是一個簡單的 HTML / CSS / JavaScript 範例頁面</p>
  </header>

  <nav>
    <ul>
      <li><a href="#about">關於</a></li>
      <li><a href="#features">功能</a></li>
      <li><a href="#test">互動測試</a></li>
    </ul>
  </nav>

  <main class="container">
    <section id="about" class="card">
      <h2>關於這個網站</h2>
      <p>
        這個頁面是用來測試網站版型、按鈕互動、區塊排版與基礎 JavaScript 功能，
        很適合拿來當作開發起始模板。
      </p>
    </section>

    <section id="features" class="card">
      <h2>網站功能</h2>
      <div class="features">
        <div class="feature-box">
          <h3>簡潔設計</h3>
          <p>乾淨的版面配置，方便後續修改。</p>
        </div>
        <div class="feature-box">
          <h3>響應式排版</h3>
          <p>支援手機與桌面瀏覽。</p>
        </div>
        <div class="feature-box">
          <h3>互動按鈕</h3>
          <p>可測試基本 JavaScript 點擊事件。</p>
        </div>
      </div>
    </section>

    <section id="test" class="card">
      <h2>互動測試</h2>
      <p>按一下下面的按鈕，測試 JavaScript 是否正常運作。</p>
      <button class="btn" id="testButton">點我測試</button>
      <div id="message"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 測試網站 Demo. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
