<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>測試網站</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    nav {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
      justify-content: center;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    nav a:hover {
      color: #4f46e5;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin-bottom: 12px;
      color: #4f46e5;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #3730a3;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .feature-box {
      background: #eef2ff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #666;
    }

    #message {
      margin-top: 14px;
      font-weight: bold;
      color: #059669;
    }
  </style>
</head>
<body>
  <header>
    <h1>歡迎來到測試網站</h1>
    <p>這是一個簡單的 HTML / CSS / JavaScript 範例頁面</p>
  </header>

  <nav>
    <ul>
      <li><a href="#about">關於</a></li>
      <li><a href="#features">功能</a></li>
      <li><a href="#test">互動測試</a></li>
    </ul>
  </nav>

  <main class="container">
    <section id="about" class="card">
      <h2>關於這個網站</h2>
      <p>
        這個頁面是用來測試網站版型、按鈕互動、區塊排版與基礎 JavaScript 功能。
        很適合拿來當作開發起始模板。
      </p>
    </section>

    <section id="features" class="card">
      <h2>網站功能</h2>
      <div class="features">
        <div class="feature-box">
          <h3>簡潔設計</h3>
          <p>乾淨的版面配置，方便後續修改。</p>
        </div>
        <div class="feature-box">
          <h3>響應式排版</h3>
          <p>支援手機與桌面瀏覽。</p>
        </div>
        <div class="feature-box">
          <h3>互動按鈕</h3>
          <p>可測試基本 JavaScript 點擊事件。</p>
        </div>
      </div>
    </section>

    <section id="test" class="card">
      <h2>互動測試</h2>
      <p>按一下下面的按鈕，測試 JavaScript 是否正常運作。</p>
      <button class="btn" onclick="showMessage()">點我測試</button>
      <div id="message"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 測試網站 Demo. All rights reserved.</p>
  </footer>

  <script>
    function showMessage() {
      const message = document.getElementById("message");
      message.textContent = "按鈕測試成功，JavaScript 運作正常。";
    }
  </script>
</body>
</html>
